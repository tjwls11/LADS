<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LADS{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#f7f9fb',
            primary: '#091426',
            surface: '#ffffff',
            'surface-soft': '#f2f4f6',
            'surface-line': '#d6dbe3',
            muted: '#5d6675',
            error: '#ba1a1a'
          },
          fontFamily: {
            sans: ['Noto Sans KR', 'Inter', 'system-ui', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Consolas', 'monospace']
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; min-width: 0; letter-spacing: 0; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body { font-family: "Noto Sans KR", Inter, system-ui, sans-serif; }
    #app-shell { --sidebar-width: 16rem; }
    img, svg, video, canvas { max-width: 100%; height: auto; }
    table { max-width: 100%; }
    pre, code, .font-mono { overflow-wrap: anywhere; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 450, 'GRAD' 0, 'opsz' 24; }
    #sidebar {
      width: var(--sidebar-width);
      transform: translateX(-100%);
      transition: none !important;
    }
    #app-shell.sidebar-open #sidebar { transform: translateX(0); }
    #app-content {
      width: 100%;
      min-width: 0;
      transition: none;
    }
    #app-shell.sidebar-open #app-content {
      width: calc(100% - var(--sidebar-width));
      margin-left: var(--sidebar-width);
    }
    #sidebar-backdrop.is-visible { display: block; }
    #sidebar-resizer {
      position: absolute;
      top: 0;
      right: -5px;
      z-index: 50;
      height: 100%;
      width: 10px;
      cursor: ew-resize;
      touch-action: none;
    }
    #sidebar-resizer::after {
      content: '';
      position: absolute;
      top: 0;
      left: 4px;
      height: 100%;
      width: 2px;
      background: transparent;
      transition: background .12s ease;
    }
    #sidebar-resizer:hover::after,
    #sidebar-resizer.is-resizing::after {
      background: #94a3b8;
    }
    .menu-toggle-btn {
      display: flex;
      height: 36px;
      width: 36px;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      color: #0f172a;
      transition: background .15s ease;
    }
    .menu-toggle-btn:hover { background: #f1f5f9; }
    #app-shell.sidebar-open #app-content [data-menu-toggle] {
      display: none;
    }
    .nav-link {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 24px; color: #64748b; font-size: 15px;
      transition: background .15s ease, color .15s ease;
    }
    .nav-link:hover { background: #f8fafc; color: #334155; }
    .nav-active {
      background: #eef2f7; color: #0f172a;
      border-right: 4px solid #0f172a; font-weight: 800;
    }
    #app-shell.sidebar-compact .nav-link {
      gap: 10px;
      padding-left: 14px;
      padding-right: 12px;
      font-size: 13px;
    }
    #app-shell.sidebar-compact #sidebar .p-5 {
      padding-left: 12px;
      padding-right: 12px;
    }
    #app-shell.sidebar-compact #sidebar .p-5 a {
      padding-left: 8px;
      padding-right: 8px;
      font-size: 13px;
    }
    main, section, article, aside, header, footer, div { min-width: 0; }
    @media (max-width: 767px) {
      #app-shell.sidebar-open #app-content {
        width: 100%;
        margin-left: 0;
      }
      #sidebar {
        width: min(var(--sidebar-width), calc(100vw - 48px));
      }
      #sidebar-resizer {
        display: none;
      }
      main {
        padding-left: 12px !important;
        padding-right: 12px !important;
      }
      .nav-link {
        padding-left: 20px;
        padding-right: 20px;
      }
    }
    @media (max-width: 480px) {
      .grid {
        grid-template-columns: minmax(0, 1fr) !important;
      }
      .action-primary,
      .action-secondary,
      .filter-btn,
      .detail-filter-btn {
        max-width: 100%;
      }
      h1, h2, h3, p, a, button, span, strong, td, th {
        overflow-wrap: anywhere;
      }
    }
  </style>
</head>
<body id="app-shell" class="min-h-screen bg-background text-[15px] text-slate-950 antialiased">
  {% set path = request.path %}

  <!-- 모바일 백드롭 -->
  <div id="sidebar-backdrop" onclick="toggleMenu(false)"
       class="fixed inset-0 z-30 hidden bg-black/40 md:hidden"></div>

  <!-- 사이드바 (모바일: 슬라이드-인 드로어 / md+: 항상 표시) -->
  <nav id="sidebar"
       class="fixed left-0 top-0 z-40 flex h-full flex-col border-r border-slate-200 bg-white font-medium text-slate-900">

    <!-- 모바일 전용 드로어 헤더 -->
    <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
      <span class="text-[17px] font-black tracking-tight">LADS</span>
      <button type="button" onclick="toggleMenu(false)" aria-label="메뉴 닫기"
              class="menu-toggle-btn" data-menu-toggle>
        <span class="material-symbols-outlined text-[24px]">menu</span>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto py-3">
      <a class="nav-link {% if path == '/' %}nav-active{% endif %}" href="/">
        <span class="material-symbols-outlined">timeline</span>
        파이프라인 모니터
      </a>
      <a class="nav-link {% if path == '/bac' %}nav-active{% endif %}" href="/bac">
        <span class="material-symbols-outlined">lock_open</span>
        BAC 진단
      </a>
      <a class="nav-link {% if path == '/targets' %}nav-active{% endif %}" href="/targets">
        <span class="material-symbols-outlined">gps_fixed</span>
        타깃 설정
      </a>
      <a class="nav-link {% if path == '/runs' or path.startswith('/runs/') %}nav-active{% endif %}" href="/runs">
        <span class="material-symbols-outlined">history</span>
        실행이력
      </a>
    </div>
    <div class="hidden">
      <a class="nav-link {% if path == '/' %}nav-active{% endif %}" href="/">
        <span class="material-symbols-outlined">timeline</span>
        파이프라인 모니터
      </a>
      <a class="nav-link {% if path == '/targets' %}nav-active{% endif %}" href="/targets">
        <span class="material-symbols-outlined">gps_fixed</span>
        타깃 설정
      </a>
      <a class="nav-link {% if path == '/bac' %}nav-active{% endif %}" href="/bac">
        <span class="material-symbols-outlined">lock_open</span>
        BAC 진단
      </a>
      <a class="nav-link {% if path == '/runs' or path.startswith('/runs/') %}nav-active{% endif %}" href="/runs">
        <span class="material-symbols-outlined">history</span>
        실행 이력
      </a>
    </div>

    <div class="px-5 pb-2 hidden" id="nav-scan-badge">
      <div class="flex items-center gap-2 rounded bg-amber-50 border border-amber-200 px-3 py-2 text-[13px] font-bold text-amber-700">
        <span class="h-2 w-2 rounded-full bg-amber-400 animate-pulse"></span>
        <span id="nav-scan-label">스캔 중...</span>
        <a href="/" class="ml-auto text-[11px] underline hover:no-underline">보기</a>
      </div>
    </div>

    <div class="p-5">
      <a class="flex h-12 w-full items-center justify-center gap-2 rounded-sm bg-slate-800 text-[15px] font-bold text-white hover:bg-slate-900"
         href="/" onclick="if(location.pathname=='/'){event.preventDefault();_startStream('/stream/all');}">
        <span class="material-symbols-outlined text-[20px]">play_arrow</span>
        전체 스캔 시작
      </a>
    </div>
    <div id="sidebar-resizer" aria-label="사이드바 폭 조절" role="separator"></div>
  </nav>

  <div id="app-content" class="min-h-screen">
    <!-- 모바일 상단 헤더 -->
    <header class="sticky top-0 z-20 flex h-14 items-center justify-between border-b border-slate-200 bg-white px-4">
      <button type="button" onclick="toggleMenu()" aria-label="메뉴 열기"
              class="menu-toggle-btn" data-menu-toggle>
        <span class="material-symbols-outlined text-[24px]">menu</span>
      </button>
      <div></div>
      <div class="w-9"></div>
    </header>

    <main class="min-h-screen bg-background px-4 py-6 sm:px-6 sm:py-8 md:px-10 md:py-10 2xl:px-14">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
